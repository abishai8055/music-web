<!DOCTYPE html>
<html>
<head>
    <title>Test Cloudinary Upload</title>
</head>
<body>
    <h1>Test Cloudinary Upload</h1>
    <input type="file" id="fileInput" accept="image/*">
    <button onclick="testUpload()">Upload</button>
    <div id="result"></div>

    <script>
        async function testUpload() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) {
                alert('Please select a file');
                return;
            }

            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", "musicWebsite");

            try {
                const response = await fetch(
                    "https://api.cloudinary.com/v1_1/dmlsgnf20/image/upload",
                    {
                        method: "POST",
                        body: formData
                    }
                );

                const data = await response.json();
                
                if (data.error) {
                    document.getElementById('result').innerHTML = 
                        `<p style="color: red;">Error: ${JSON.stringify(data.error)}</p>`;
                } else {
                    document.getElementById('result').innerHTML = 
                        `<p style="color: green;">Success!</p>
                         <img src="${data.secure_url}" width="200">
                         <p>URL: ${data.secure_url}</p>`;
                }
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
